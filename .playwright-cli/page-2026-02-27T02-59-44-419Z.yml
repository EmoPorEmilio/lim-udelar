    - main [ref=e32]:
      - generic [ref=e33]:
        - heading "¿Qué es la LIM?" [level=2] [ref=e34]
        - paragraph [ref=e36]: La Licenciatura en Ingeniería de Medios (LIM) es una carrera interdisciplinaria ofrecida conjuntamente por la Facultad de Información y Comunicación (FIC) y la Facultad de Ingeniería (Fing) de la Universidad de la República (Udelar). Combina formación en ingeniería, comunicación, creatividad e innovación para preparar profesionales capaces de diseñar y desarrollar productos y experiencias mediáticas.
      - generic [ref=e37]:
        - heading "¿Cuánto dura la carrera?" [level=2] [ref=e38]
        - paragraph [ref=e40]: "La carrera tiene una duración de 4 años, organizada en 8 semestres. El plan de estudios comprende 360 créditos distribuidos en cuatro áreas de formación: Ingeniería, Información Comunicación y Medios, Creatividad e Innovación, y Complementaria."
      - generic [ref=e41]:
        - heading "¿Cuáles son las áreas de formación?" [level=2] [ref=e42]
        - paragraph [ref=e44]: "La LIM se estructura en cuatro áreas: (1) Ingeniería (ING) — fundamentos de programación, matemáticas, estructuras de datos, procesamiento de señales y aprendizaje automático; (2) Información, Comunicación y Medios (ICM) — teoría de la comunicación, narrativas audiovisuales, diseño de interacción y estudios de audiencia; (3) Creatividad e Innovación (CI) — diseño visual, producción audiovisual, animación, experiencias inmersivas y trabajo final de grado; (4) Complementaria (COMP) — inglés técnico, gestión de proyectos y electivas."
      - generic [ref=e45]:
        - heading "¿Cuáles son los requisitos de ingreso?" [level=2] [ref=e46]
        - paragraph [ref=e48]: "Para ingresar a la LIM se requiere: bachillerato completo con orientación en matemática o similar, o haber aprobado al menos 80 créditos en una carrera universitaria de Udelar. La primera generación (2026) tendrá un cupo piloto de 50 estudiantes seleccionados mediante un proceso que considera formación previa y carta de motivación."
      - generic [ref=e49]:
        - heading "¿Cuántos estudiantes habrá en la primera generación?" [level=2] [ref=e50]
        - paragraph [ref=e52]: La primera generación de la LIM, que ingresa en 2026, contará con un cupo piloto de 50 estudiantes. Este número permite asegurar una experiencia educativa personalizada y un adecuado seguimiento académico durante la etapa inicial del programa.
      - generic [ref=e53]:
        - heading "¿Cómo es el Trabajo Final de Grado?" [level=2] [ref=e54]
        - paragraph [ref=e56]: El Trabajo Final de Grado (TFG) tiene un valor de 30 créditos y se desarrolla a lo largo de los dos últimos semestres de la carrera (semestres 7 y 8). Se realiza en equipos interdisciplinarios y debe integrar conocimientos de al menos dos áreas de formación. El proyecto incluye fases de investigación, diseño, prototipado, producción y presentación pública ante un tribunal evaluador.
      - generic [ref=e57]:
        - heading "¿Cuáles son las salidas laborales?" [level=2] [ref=e58]
        - paragraph [ref=e60]: "Los egresados de la LIM pueden desempeñarse en: desarrollo de experiencias interactivas y multimedia, producción audiovisual y postproducción digital, diseño de interfaces y experiencia de usuario (UX/UI), desarrollo de videojuegos y experiencias inmersivas (VR/AR), análisis de datos y visualización de información, gestión de proyectos de innovación mediática, investigación en comunicación y tecnología, y consultoría en transformación digital de medios."
      - generic [ref=e61]:
        - heading "¿Cómo puedo contactar a la coordinación?" [level=2] [ref=e62]
        - paragraph [ref=e64]: "Puedes contactar a la coordinación de la LIM a través de los siguientes correos electrónicos: lim@fic.edu.uy (coordinación general FIC) y lim@fing.edu.uy (coordinación general Fing). También puedes acercarte a las oficinas de coordinación en cualquiera de las dos facultades durante el horario de atención."
      - generic [ref=e65]:
        - heading "¿Qué tipo de proyectos se realizan durante la carrera?" [level=2] [ref=e66]
        - paragraph [ref=e68]: "A lo largo de la carrera los estudiantes desarrollan proyectos como: cortometrajes y documentales, webdocs y narrativas transmedia, animaciones 2D y 3D, instalaciones interactivas, aplicaciones multimedia, experiencias de realidad virtual y aumentada, visualizaciones de datos, y prototipos de productos mediáticos innovadores. Los proyectos se realizan de forma individual y en equipo, con complejidad creciente."
      - generic [ref=e69]:
        - heading "¿Qué líneas de investigación existen?" [level=2] [ref=e70]
        - paragraph [ref=e72]: "La LIM participa en líneas de investigación que incluyen: inteligencia artificial aplicada a medios y comunicación, preservación y archivo audiovisual digital, diseño de interacción y experiencia de usuario, accesibilidad en medios digitales, narrativas emergentes y nuevos formatos mediáticos, análisis computacional de contenidos mediáticos, y tecnologías inmersivas para educación y cultura."
      - generic [ref=e73]:
